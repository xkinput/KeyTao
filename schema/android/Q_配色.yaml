    键盘(状态栏+底栏): 0xD0D3DC #状态栏、悬浮窗^、气泡
    状态栏: Q/默认/ztl.9.png
    悬浮窗^: 0xFDFDFD
    按键: Q/默认/zj.9.png
    按键高亮: Q/默认/zjh.9.png
    回车: Q/默认/hc.9.png
    回车高亮: Q/默认/hch.9.png
# 🟠 字色：
    首选（高亮标注项）: 0x303030 #首选提示、首选序号、气泡字高亮
