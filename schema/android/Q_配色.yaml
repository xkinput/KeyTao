preset_color_schemes:
  default:
    name: 默认
    dark_scheme: default_dark #指定夜间配色
# 🟠 背景：
    状态栏首选（高亮标注项）+非首选高亮: 0x00 #编码+悬浮窗首选（高亮标注项）、候选分割线、气泡高亮
